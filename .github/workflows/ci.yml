# Phase 8 hardening: guard every PR with the full verification suite.
#
# Two independent jobs (frontend + Rust) so a TS-only regression doesn't
# wait on Rust's cold cache. Windows/macOS bundle build is deliberately not
# in CI — cross-platform bundle validation is a separate concern (see
# docs/PHASE8_DESIGN.md's rationale).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch when a new commit lands. Broadcast
# work has fast iteration cycles; letting stale runs finish just delays
# feedback on the newest push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-frontend:
    name: Frontend (TypeScript + verify scripts)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript typecheck
        run: bunx tsc --noEmit

      - name: Production build
        run: bun run build

      - name: Phase 7 verification
        run: bun run scripts/verify-phase7.ts

      - name: Phase 8 verification
        run: bun run scripts/verify-phase8.ts

      - name: Phase 9 verification
        run: bun run scripts/verify-phase9.ts

      - name: Phase 10 verification
        run: bun run scripts/verify-phase10.ts

      - name: Phase 10.1 verification
        run: bun run scripts/verify-phase10_1.ts

  verify-rust:
    name: Rust (cargo check + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        # Package names verified against Ubuntu 24.04 (noble). libgtk-3-dev
        # pulls the whole GDK/GTK toolchain gdk-sys and pango-sys need at
        # compile time — cargo check fails without them (observed live in
        # Phase 7 verification).
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: cargo check --tests
        working-directory: src-tauri
        run: cargo check --tests

      - name: cargo test --lib
        working-directory: src-tauri
        run: cargo test --lib
